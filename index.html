<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LUMIN - Neon Arcade</title>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        const firebaseConfig = {
            apiKey: "AIzaSyACsTGUuqymFd1emLyGp0uL7foTEiumH9k",
            authDomain: "neon-ball-lego.firebaseapp.com",
            projectId: "neon-ball-lego",
            storageBucket: "neon-ball-lego.firebasestorage.app",
            messagingSenderId: "1001917014792",
            appId: "1:1001917014792:web:dcbcb583d05036f22002bd"
        };
        const app = initializeApp(firebaseConfig);
        const db  = getFirestore(app);
        window.saveScore = async (nick, score) => {
            if (!nick || score <= 0) return;
            try { await addDoc(collection(db,"leaderboard"),{nick,score:Number(score),date:Date.now()}); window.loadLeaderboard(); }
            catch(e){ console.error("Firebase Save Error:",e); }
        };
        window.loadLeaderboard = async () => {
            try {
                const q = query(collection(db,"leaderboard"),orderBy("score","desc"),limit(15));
                const snap = await getDocs(q);
                const list = document.getElementById("lb-list");
                if(!list) return;
                list.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data(), isMe = (d.nick===window.playerNick);
                    const s = isMe ? 'color:#ffd700;font-weight:bold;text-shadow:0 0 8px #ffd700;' : '';
                    list.innerHTML += `<div style="display:flex;justify-content:space-between;margin-bottom:5px;${s}"><span>${isMe?'▶ ':''}${d.nick}</span><span>${d.score}</span></div>`;
                });
            } catch(e){ console.error("Load Leaderboard Error:",e); }
        };
    </script>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #050505;
            font-family: 'Courier New', Courier, monospace;
        }

        #nick-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.93);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 9999;
        }
        #nick-overlay h2 { color: #0ff; letter-spacing: 2px; font-size: 18px; margin-bottom: 20px; }
        #nick-input {
            background: #111; border: 2px solid #f0f; color: #fff;
            padding: 12px; font-size: 20px; text-align: center;
            outline: none; margin-bottom: 20px;
            width: 80%; max-width: 260px; border-radius: 4px;
        }
        #start-btn {
            background: #f0f; color: #fff; border: none;
            padding: 12px 36px; font-size: 16px; font-weight: bold;
            cursor: pointer; border-radius: 4px;
            min-width: 140px; min-height: 48px;
        }

        #game-wrapper {
            position: absolute;
            top: 0; left: 0;
            transform-origin: top left;
        }

        #scoreboard {
            width: 404px; background: #000;
            border: 2px solid #444;
            border-bottom: 2px solid #888;
            display: flex; justify-content: space-around;
            padding: 10px 0; transition: filter 0.5s ease;
        }
        .stat-box { text-align: center; }
        .label { font-size: 11px; display: block; text-transform: uppercase; letter-spacing: 2px; color: #aaa; margin-bottom: 2px; font-weight: bold; }
        #currentScore { color: #0ff; text-shadow: 0 0 12px #0ff; }
        #bestScore    { color: #f0f; text-shadow: 0 0 12px #f0f; }
        .value { font-size: 28px; font-weight: bold; }

        #canvas-wrap { position: relative; width: 404px; height: 600px; border-left: 2px solid #444; border-right: 2px solid #444; }

        canvas {
            display: block;
            background: #000;
            transition: filter 0.5s ease;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
            width: 400px; height: 600px;
        }

        #game-over-ui {
            position: absolute; top: 10%; left: 50%;
            transform: translateX(-50%);
            width: 280px; max-width: 90%;
            display: none; flex-direction: column; align-items: center;
            z-index: 20; pointer-events: none;
        }
        .go-title   { color: #fff; font-size: 32px; font-weight: bold; margin-bottom: 5px; text-shadow: 0 0 15px #f0f; }
        .replay-btn { color: #fff; font-size: 16px; margin-bottom: 15px; font-weight: bold;
            text-shadow: 0 0 10px #0ff; animation: blink 1.5s ease-in-out infinite; }
        @keyframes blink { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.95)} }
        #leaderboard { width:100%; background:rgba(20,20,20,0.95); border:2px solid #0ff; color:#fff; padding:10px; text-align:center; box-shadow:0 0 20px rgba(0,255,255,0.3); }

        #ad-container {
            width: 404px; height: 40px;
            background: #000; border: 2px solid #444;
            border-top: 2px solid #888;
            position: relative; overflow: hidden;
            display: flex; align-items: center; padding-left: 10px;
            transition: filter 0.5s ease; cursor: pointer;
        }
        #yt-logo { width:20px; height:14px; background:#f00; border-radius:4px; display:flex; align-items:center; justify-content:center; margin-right:10px; flex-shrink:0; z-index:2; }
        #yt-logo::after { content:""; border-left:5px solid #fff; border-top:3px solid transparent; border-bottom:3px solid transparent; }
        #ad-text { white-space:nowrap; color:#ffd700; font-weight:bold; font-size:11px; transform:translateX(360px); }
        .blink-fast { animation:blinker .4s step-start infinite; color:#fff !important; }
        @keyframes blinker { 50%{opacity:0} }

        .dimmed { filter: brightness(0.3) blur(2px); pointer-events: none; }
    </style>
</head>
<body>

    <div id="nick-overlay">
        <h2>YOUR NICKNAME</h2>
        <input type="text" id="nick-input" placeholder="Enter Nick..." maxlength="10" autocomplete="off" autocorrect="off" spellcheck="false">
        <button id="start-btn">ENGAGE</button>
    </div>

    <div id="game-wrapper">
        <div id="scoreboard">
            <div class="stat-box"><span class="label">SCORE</span><span id="currentScore" class="value">0</span></div>
            <div class="stat-box"><span class="label">YOUR BEST</span><span id="bestScore" class="value">0</span></div>
        </div>
        <div id="canvas-wrap">
            <canvas id="gameCanvas" width="400" height="600"></canvas>
            <div id="game-over-ui">
                <div class="go-title">GAME OVER</div>
                <div class="replay-btn">TAP TO REPLAY</div>
                <div id="leaderboard">
                    <h3 style="margin-top:0;color:#f0f;font-size:16px;">BEST PLAYERS</h3>
                    <div id="lb-list" style="font-size:12px;font-family:monospace;"></div>
                </div>
            </div>
        </div>
        <div id="ad-container">
            <div id="yt-logo"></div>
            <div id="ad-text"></div>
        </div>
    </div>

<script>
    // ── SKALOWANIE ─────────────────────────────────────────────────────
    const gameWrapper = document.getElementById("game-wrapper");
    const GAME_W = 404, GAME_H = 694;

    // Pomocniczy div do pomiaru prawdziwej wysokości viewportu (działa w Opera, Chrome, Safari)
    var vpHelper = document.createElement('div');
    vpHelper.style.cssText = 'position:fixed;top:0;left:0;width:1px;height:100dvh;pointer-events:none;visibility:hidden;';
    document.body.appendChild(vpHelper);

    function scaleGame() {
        var vw = window.innerWidth;
        // Używamy dvh przez helper — poprawnie obsługuje pasek adresu w każdej przeglądarce
        var vh = vpHelper.getBoundingClientRect().height || window.innerHeight;
        var scale = Math.min(vw / GAME_W, (vh * 0.93) / GAME_H);
        var tx = (vw - GAME_W * scale) / 2;
        var ty = (vh - GAME_H * scale) / 2;
        gameWrapper.style.transform = "translate("+tx+"px,"+ty+"px) scale("+scale+")";
    }
    window.addEventListener('resize', scaleGame);
    window.addEventListener('orientationchange', function(){ setTimeout(scaleGame, 350); });
    // Dodatkowe odpalenie po załadowaniu — Opera czasem potrzebuje chwili
    window.addEventListener('load', function(){ setTimeout(scaleGame, 100); });
    scaleGame();

    // ── DOM ────────────────────────────────────────────────────────────
    const canvas      = document.getElementById("gameCanvas");
    const ctx         = canvas.getContext("2d", { alpha: false });
    const scoreEl     = document.getElementById("currentScore");
    const bestScoreEl = document.getElementById("bestScore");
    const scoreboard  = document.getElementById("scoreboard");
    const gameOverUI  = document.getElementById("game-over-ui");
    const nickOverlay = document.getElementById("nick-overlay");
    const nickInput   = document.getElementById("nick-input");
    const adContainer = document.getElementById("ad-container");

    // ── NICK ───────────────────────────────────────────────────────────
    window.playerNick = localStorage.getItem("neonBallNick") || "";
    if (window.playerNick) nickInput.value = window.playerNick;

    function doStart() {
        var val = nickInput.value.trim();
        if (val.length < 2) { alert("Nick too short!"); return; }
        window.playerNick = val;
        localStorage.setItem("neonBallNick", val);
        nickOverlay.style.display = "none";
        gameActive = true;
        gameStarted = false;
        if (window.loadLeaderboard) window.loadLeaderboard();
    }
    document.getElementById("start-btn").addEventListener("click", doStart);
    nickInput.addEventListener("keydown", function(e){ if(e.key==="Enter") doStart(); });

    // ── REKLAMA ────────────────────────────────────────────────────────
    var myVideos = ["L3JZS2R_D6k","BJU6OyDPMEY","BzM9CYuPW8M"];
    var adTexts  = ["Build LEGO Cars!","Epic MOCs!"];
    var adText   = document.getElementById("ad-text");
    var isAdRunning = false;

    function openRandomVideo() {
        window.open("https://www.youtube.com/watch?v="+myVideos[Math.floor(Math.random()*myVideos.length)], "_blank");
    }
    adContainer.addEventListener("click", openRandomVideo);
    adContainer.addEventListener("touchend", function(e){ e.preventDefault(); openRandomVideo(); }, { passive: false });

    function runAdCycle() {
        if (isAdRunning) return;
        isAdRunning = true;
        adText.innerText = adTexts[Math.floor(Math.random()*adTexts.length)];
        var pos = 360;
        var scroll = setInterval(function(){
            pos -= 2.2; adText.style.transform = "translateX("+pos+"px)";
            if (pos <= 5) {
                clearInterval(scroll); adText.style.transform = "translateX(5px)";
                setTimeout(function(){
                    adText.innerText = "CLICK TO WATCH!"; adText.classList.add("blink-fast");
                    setTimeout(function(){
                        adText.classList.remove("blink-fast"); adText.innerText = "";
                        adText.style.transform = "translateX(360px)"; isAdRunning = false;
                    }, 4000);
                }, 1000);
            }
        }, 20);
    }
    setTimeout(runAdCycle, 3000);
    setInterval(runAdCycle, 30000);

    // ── AUDIO ──────────────────────────────────────────────────────────
    var audioCtx = null;
    function getAC() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        return audioCtx;
    }
    function playSound(f,t,d,v) {
        try {
            var ac = getAC();
            if (ac.state==='suspended') ac.resume();
            var o = ac.createOscillator(), g = ac.createGain();
            o.type = t; o.frequency.setValueAtTime(f, ac.currentTime);
            g.gain.setValueAtTime(v, ac.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime+d);
            o.connect(g); g.connect(ac.destination); o.start(); o.stop(ac.currentTime+d);
        } catch(e){}
    }
    var sfx = {
        jump:  function(){ playSound(480,'triangle',0.1,0.3); },
        score: function(){ playSound(950,'sine',0.2,0.12); },
        hit:   function(){ playSound(120,'sawtooth',0.4,0.2); playSound(80,'sine',0.5,0.2); }
    };

    // ── TŁO ────────────────────────────────────────────────────────────
    var bgCanvas = document.createElement('canvas');
    bgCanvas.width = 400; bgCanvas.height = 600;
    var bgCtx = bgCanvas.getContext('2d');
    bgCtx.fillStyle = "#000"; bgCtx.fillRect(0,0,400,600);
    bgCtx.strokeStyle = "#151515"; bgCtx.beginPath();
    for (var i=0; i<=400; i+=40){ bgCtx.moveTo(i,0); bgCtx.lineTo(i,600); }
    for (var i=0; i<=600; i+=40){ bgCtx.moveTo(0,i); bgCtx.lineTo(400,i); }
    bgCtx.stroke();

    // ── TRAIL ──────────────────────────────────────────────────────────
    var TRAIL_LEN = 12;
    var trailX = new Float32Array(TRAIL_LEN);
    var trailY = new Float32Array(TRAIL_LEN);
    var trailHead = 0, trailCount = 0;
    function trailPush(x,y){ trailX[trailHead]=x; trailY[trailHead]=y; trailHead=(trailHead+1)%TRAIL_LEN; if(trailCount<TRAIL_LEN)trailCount++; }
    function trailClear(){ trailHead=0; trailCount=0; }

    // ── PARTICLES ──────────────────────────────────────────────────────
    var POOL = [];
    for (var i=0; i<60; i++) POOL.push({x:0,y:0,vx:0,vy:0,r:0,a:0,on:false});
    var activePart = 0;
    function explode(x,y) {
        var n=0;
        for (var i=0; i<60&&n<20; i++) {
            if (!POOL[i].on) {
                var p=POOL[i]; p.x=x; p.y=y;
                p.vx=(Math.random()-0.5)*12; p.vy=(Math.random()-0.5)*12;
                p.r=Math.random()*3+1; p.a=1; p.on=true;
                n++; activePart++;
            }
        }
    }

    // ── STAN ───────────────────────────────────────────────────────────
    var score=0, bestScore=Number(localStorage.getItem("neonBallBestScore"))||0;
    bestScoreEl.innerText = bestScore;
    var gameActive=false, gameStarted=false, canRestart=true, firstLoad=true, frameCount=0;
    var ball = {x:100, y:300, r:12, gravity:0.6, vel:0, jump:-8, color:"#f0f"};
    var pipes=[], PW=55, BASE_GAP=165, SPEED=3.2;
    var PIPE_CLR = {STATIC:"#0ff", MOVING:"#0f0", SHRINKING:"#ff0"};
    var FRAME_MS = 1000/60, lastTime=0;

    function createPipe() {
        var types=['STATIC','MOVING','SHRINKING'];
        var type=types[Math.floor(Math.random()*3)];
        var red=Math.min(0.25,Math.floor(score/20)*0.05);
        var gap=BASE_GAP*(1-red);
        if(type==='STATIC') gap*=0.90;
        var h=Math.floor(Math.random()*(600-gap-200))+100;
        pipes.push({x:400,top:h,baseTop:h,passed:false,type,offset:Math.random()*Math.PI*2,gap:gap,maxGap:gap,shrinkDir:Math.random()>0.5?'TOP':'BOTTOM'});
    }

    // ── DRAW ───────────────────────────────────────────────────────────
    function draw() {
        ctx.drawImage(bgCanvas,0,0);
        ctx.fillStyle="#022"; ctx.lineWidth=3;
        for(var i=0;i<pipes.length;i++){ var p=pipes[i],bY=p.top+p.gap; ctx.fillRect(p.x,0,PW,p.top); ctx.fillRect(p.x,bY,PW,600-bY); }
        for(var i=0;i<pipes.length;i++){ var p=pipes[i],bY=p.top+p.gap; ctx.strokeStyle=PIPE_CLR[p.type]; ctx.strokeRect(p.x,0,PW,p.top); ctx.strokeRect(p.x,bY,PW,600-bY); }

        if (gameActive||!gameStarted) {
            ctx.fillStyle=ball.color;
            for(var i=0;i<trailCount;i++){
                var idx=(trailHead-1-i+TRAIL_LEN)%TRAIL_LEN;
                var r=ball.r*(1-i/15); if(r<=0)continue;
                ctx.globalAlpha=(1-i/trailCount)*0.4;
                ctx.beginPath(); ctx.arc(trailX[idx]-i*2,trailY[idx],r,0,Math.PI*2); ctx.fill();
            }
            ctx.globalAlpha=1;
            ctx.beginPath(); ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);
            ctx.fillStyle=ball.color; ctx.strokeStyle="#fff"; ctx.lineWidth=2; ctx.fill(); ctx.stroke();
        }

        if(activePart>0){
            for(var i=0;i<60;i++){
                var p=POOL[i]; if(!p.on)continue;
                p.x+=p.vx; p.y+=p.vy; p.a-=0.02;
                if(p.a<=0){p.on=false;activePart--;continue;}
                ctx.globalAlpha=p.a; ctx.fillStyle=ball.color;
                ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
            }
            ctx.globalAlpha=1;
        }

        if(firstLoad&&gameActive&&!gameStarted){
            ctx.fillStyle="#fff"; ctx.font="bold 18px Arial"; ctx.textAlign="center";
            ctx.fillText("TAP TO START",200,350);
        }
    }

    // ── UPDATE ─────────────────────────────────────────────────────────
    function update() {
        if(!gameActive||!gameStarted) return;
        frameCount++; ball.vel+=ball.gravity; ball.y+=ball.vel;
        trailPush(ball.x,ball.y);
        if(ball.y+ball.r>600||ball.y-ball.r<0){gameOver();return;}
        if(!pipes.length||pipes[pipes.length-1].x<180) createPipe();
        for(var i=pipes.length-1;i>=0;i--){
            var p=pipes[i]; p.x-=SPEED;
            if(p.type==='MOVING') p.top=p.baseTop+Math.sin(frameCount*0.04+p.offset)*50;
            else if(p.type==='SHRINKING'){
                var sv=Math.abs(Math.sin(frameCount*0.05+p.offset))*55;
                if(p.shrinkDir==='TOP'){p.top=p.baseTop+sv;p.gap=p.maxGap-sv;}
                else p.gap=p.maxGap-sv;
            }
            if(ball.x+ball.r>p.x&&ball.x-ball.r<p.x+PW&&(ball.y-ball.r<p.top||ball.y+ball.r>p.top+p.gap)){gameOver();return;}
            if(!p.passed&&p.x+PW<ball.x){
                score++;p.passed=true;scoreEl.innerText=score;sfx.score();
                if(score>bestScore){bestScore=score;bestScoreEl.innerText=bestScore;localStorage.setItem("neonBallBestScore",bestScore);}
            }
            if(p.x+PW<0) pipes.splice(i,1);
        }
    }

    // ── GAME OVER ──────────────────────────────────────────────────────
    function gameOver() {
        if(!gameActive) return;
        sfx.hit(); explode(ball.x,ball.y);
        gameActive=false; canRestart=false;
        setTimeout(function(){
            canvas.classList.add('dimmed');
            scoreboard.classList.add('dimmed');
            adContainer.classList.add('dimmed');
            gameOverUI.style.display="flex";
            if(window.saveScore) window.saveScore(window.playerNick,score);
            setTimeout(function(){canRestart=true;},300);
        },200);
    }

    // ── INPUT — TYLKO canvas, overlay ma własne handlery ───────────────
    function handleAction(e) {
        if(e.cancelable) e.preventDefault();
        if(gameActive){
            if(!gameStarted){gameStarted=true;firstLoad=false;}
            ball.vel=ball.jump; sfx.jump();
        } else if(canRestart){
            canvas.classList.remove('dimmed');
            scoreboard.classList.remove('dimmed');
            adContainer.classList.remove('dimmed');
            ball.x=100;ball.y=300;ball.vel=ball.jump;
            pipes=[];score=0;scoreEl.innerText="0";
            trailClear();activePart=0;
            for(var i=0;i<60;i++) POOL[i].on=false;
            frameCount=0;gameActive=true;gameStarted=true;firstLoad=false;
            gameOverUI.style.display="none"; sfx.jump();
        }
    }

    // Podczas gry — tylko canvas
    canvas.addEventListener("touchstart", handleAction, {passive:false});
    canvas.addEventListener("mousedown",  handleAction);
    // Po game over canvas ma pointer-events:none (dimmed) — słuchamy na document
    document.addEventListener("touchstart", function(e){
        if(nickOverlay.style.display!=="none") return;  // overlay widoczny - ignoruj
        if(!canRestart || gameActive) return;           // gra trwa - ignoruj
        handleAction(e);
    }, {passive:false});
    document.addEventListener("mousedown", function(e){
        if(nickOverlay.style.display!=="none") return;
        if(!canRestart || gameActive) return;
        handleAction(e);
    });
    window.addEventListener("keydown", function(e){
        if(e.code!=="Space") return;
        if(nickOverlay.style.display!=="none") return;
        handleAction(e);
    });

    // ── PĘTLA ──────────────────────────────────────────────────────────
    function loop(ts) {
        requestAnimationFrame(loop);
        var dt=ts-lastTime;
        if(dt<FRAME_MS) return;
        lastTime=ts-(dt%FRAME_MS);
        update(); draw();
    }
    requestAnimationFrame(loop);
</script>
</body>
</html>
